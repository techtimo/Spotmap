name: Deploy WP.org Assets

on:
  push:
    branches: [main]
    paths:
      - '.wordpress-org/**'
  workflow_dispatch:

jobs:
  deploy-assets:
    name: Sync .wordpress-org/ to SVN assets/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Deploy assets to WordPress.org SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          svn checkout --depth immediates \
              "https://plugins.svn.wordpress.org/spotmap" /tmp/svn

          svn update --set-depth infinity /tmp/svn/assets
          rsync -rc --delete "$GITHUB_WORKSPACE/.wordpress-org/" /tmp/svn/assets/

          cd /tmp/svn
          svn add --force assets/ 2>/dev/null || true
          svn status assets/ | grep '^!' | awk '{print $2}' | xargs -r svn delete --force

          if svn status assets/ | grep -qE '^[AMDR]'; then
            svn commit \
                --username "$SVN_USERNAME" \
                --password "$SVN_PASSWORD" \
                --no-auth-cache \
                --non-interactive \
                -m "Update WP.org assets (banner, icon, screenshots)"
            echo "Assets committed to SVN."
          else
            echo "No asset changes — nothing to commit."
          fi
