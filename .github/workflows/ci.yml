name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '**.php'
      - '*.json'
      - 'phpunit.xml'
      - '*.js'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '**.php'
      - '*.json'

      - 'phpunit.xml'
      - '*.js'
jobs:
  test-js:
    name: JS Tests & Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm run test:js -- --coverage

      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: js

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-build
          path: |
            build/
            public/
          retention-days: 1

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --optimize-autoloader

      - name: Start wp-env
        run: npm run wp-env start

      - name: Create test database
        run: npm run wp-env -- run cli bash -- -c "mysql -h mysql -u root -ppassword -e 'CREATE DATABASE IF NOT EXISTS wordpress_test'"

      - name: Run PHP tests
        run: npm run wp-env -- run tests-cli --env-cwd=wp-content/plugins/Spotmap sh -c "XDEBUG_MODE=coverage composer run test:coverage"

      - name: Upload PHP coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/clover.xml
          flags: php

