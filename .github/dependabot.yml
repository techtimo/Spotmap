version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      # No patched version available; devDependency only, zero production impact
      - dependency-name: webpack-dev-server
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
